<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>EcoMon: Portal Creator</title>
    <script src='https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js'></script>
    <link href='https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css' rel='stylesheet' />
    <style>
        :root { --accent: #00F2FF; --bg: #0A0A0C; --panel: #161618; --card: #1c1c1e; --portal: #BC13FE; }
        body { margin: 0; background: var(--bg); color: white; font-family: -apple-system, sans-serif; overflow: hidden; height: 100vh; }
        #map { width: 100%; height: 100vh; position: absolute; z-index: 1; }

        /* UI Oben */
        .ui-top { position: fixed; top: 15px; left: 15px; z-index: 1000; display: flex; gap: 8px; pointer-events: none; }
        .stat-badge { background: rgba(0,0,0,0.8); padding: 8px 12px; border-radius: 8px; border: 1px solid var(--accent); font-weight: bold; pointer-events: auto; }

        /* Creator Button */
        .btn-create { 
            position: fixed; top: 15px; right: 15px; z-index: 1000; 
            background: var(--portal); color: white; border: none; padding: 10px 15px; 
            border-radius: 8px; font-weight: bold; cursor: pointer; box-shadow: 0 0 10px var(--portal);
        }

        /* Dashboard */
        .dashboard { 
            position: fixed; bottom: 0; left: 0; width: 100%; height: 40vh; 
            background: var(--panel); border-top: 2px solid var(--accent); z-index: 5000; 
            padding: 15px; box-sizing: border-box; display: flex; flex-direction: column;
        }

        /* Portal Marker mit Bild-Vorschau */
        .portal-marker { 
            width: 50px; height: 50px; border-radius: 50%; border: 3px solid var(--portal);
            background-size: cover; background-position: center;
            box-shadow: 0 0 15px var(--portal); cursor: pointer;
        }

        /* Kamera Overlay */
        #camera-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: black; z-index: 10000; display: none; flex-direction: column; align-items: center; justify-content: center;
        }
        #video { width: 100%; max-height: 70%; object-fit: cover; }
        .cam-controls { margin-top: 20px; display: flex; gap: 20px; }
    </style>
</head>
<body>

    <div id="map"></div>

    <div class="ui-top">
        <div class="stat-badge">⚾ <span id="topBalls">20</span></div>
        <div class="stat-badge">📡 <span id="topRadar">0</span></div>
    </div>

    <button class="btn-create" onclick="openCamera()">➕ PORTAL ERSTELLEN</button>

    <div id="camera-overlay">
        <video id="video" autoplay playsinline></video>
        <div class="cam-controls">
            <button class="stat-badge" style="background: red;" onclick="closeCamera()">Abbrechen</button>
            <button class="stat-badge" style="background: var(--portal);" onclick="takePhoto()">FOTO MACHEN</button>
        </div>
        <canvas id="canvas" style="display:none;"></canvas>
    </div>

    <div class="dashboard">
        <div id="tab-dex" style="overflow-y: auto;">
            <h3>Eco-Dex & Entdeckungen</h3>
            <div id="dexList" style="display: flex; gap: 10px; overflow-x: auto;"></div>
        </div>
    </div>

    <script>
        let map, userPos, userMarker;
        let radars = 0, balls = 20;
        let customPortals = JSON.parse(localStorage.getItem('myPortals') || '[]');

        // Karte initialisieren
        navigator.geolocation.watchPosition(p => {
            userPos = [p.coords.longitude, p.coords.latitude];
            if (!map) {
                map = new maplibregl.Map({
                    container: 'map',
                    style: 'https://basemaps.cartocdn.com/gl/dark-matter-gl-style/style.json',
                    center: userPos, zoom: 17, pitch: 45
                });
                map.on('load', () => {
                    const el = document.createElement('div');
                    el.style = "width:12px; height:12px; background:white; border-radius:50%; border:2px solid var(--accent);";
                    userMarker = new maplibregl.Marker(el).setLngLat(userPos).addTo(map);
                    loadCustomPortals();
                });
            } else { userMarker.setLngLat(userPos); }
        }, null, { enableHighAccuracy: true });

        // Kamera Funktionen
        async function openCamera() {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
            document.getElementById('video').srcObject = stream;
            document.getElementById('camera-overlay').style.display = 'flex';
        }

        function closeCamera() {
            const stream = document.getElementById('video').srcObject;
            stream.getTracks().forEach(track => track.stop());
            document.getElementById('camera-overlay').style.display = 'none';
        }

        function takePhoto() {
            const video = document.getElementById('video');
            const canvas = document.getElementById('canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            
            const photoData = canvas.toDataURL('image/jpeg', 0.5); // Bild verkleinern für Speicher
            savePortal(photoData);
            closeCamera();
        }

        // Portal Speichern & Laden
        function savePortal(img) {
            const newPortal = {
                pos: userPos,
                image: img,
                id: Date.now()
            };
            customPortals.push(newPortal);
            localStorage.setItem('myPortals', JSON.stringify(customPortals));
            addPortalToMap(newPortal);
            alert("Portal erfolgreich erstellt!");
        }

        function loadCustomPortals() {
            customPortals.forEach(p => addPortalToMap(p));
        }

        function addPortalToMap(pData) {
            const el = document.createElement('div');
            el.className = 'portal-marker';
            el.style.backgroundImage = `url(${pData.image})`;
            
            el.onclick = () => {
                radars += 3;
                document.getElementById('topRadar').innerText = radars;
                alert("Energie gesammelt vom Foto-Portal!");
            };

            new maplibregl.Marker({element: el}).setLngLat(pData.pos).addTo(map);
        }
    </script>
</body>
</html>

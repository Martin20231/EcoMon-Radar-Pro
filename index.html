<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>EcoMon: Portal Explorer</title>
    <script src='https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js'></script>
    <link href='https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css' rel='stylesheet' />
    <style>
        :root { --accent: #00F2FF; --bg: #0A0A0C; --panel: #161618; --card: #1c1c1e; --portal: #BC13FE; }
        body { margin: 0; background: var(--bg); color: white; font-family: -apple-system, sans-serif; overflow: hidden; height: 100vh; }
        #map { width: 100%; height: 100vh; position: absolute; z-index: 1; }

        /* UI Oben */
        .ui-top { position: fixed; top: 15px; left: 15px; z-index: 1000; display: flex; gap: 8px; pointer-events: none; }
        .stat-badge { background: rgba(0,0,0,0.85); padding: 8px 12px; border-radius: 8px; border: 1px solid var(--accent); font-weight: bold; pointer-events: auto; }
        
        .btn-create { 
            position: fixed; top: 15px; right: 15px; z-index: 1000; 
            background: var(--portal); color: white; border: none; padding: 10px 15px; 
            border-radius: 8px; font-weight: bold; cursor: pointer; box-shadow: 0 0 15px var(--portal);
        }

        /* Detail View (Popups für Portale & Tiere) */
        #detail-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 11000; display: none;
            flex-direction: column; align-items: center; justify-content: center;
            padding: 20px; box-sizing: border-box;
        }
        .detail-card {
            background: var(--panel); border: 2px solid var(--accent);
            border-radius: 20px; width: 100%; max-width: 400px; overflow: hidden;
            display: flex; flex-direction: column; align-items: center;
        }
        #detail-img { width: 100%; height: 300px; object-fit: cover; background: #000; }
        .detail-info { padding: 20px; text-align: center; width: 100%; box-sizing: border-box; }

        /* Dashboard & Marker */
        .dashboard { position: fixed; bottom: 0; left: 0; width: 100%; height: 40vh; background: var(--panel); border-top: 2px solid var(--accent); z-index: 5000; padding: 15px; box-sizing: border-box; display: flex; flex-direction: column; }
        .tab-nav { display: flex; background: #2c2c2e; border-radius: 12px; margin-bottom: 15px; padding: 4px; }
        .tab-btn { flex: 1; padding: 10px; text-align: center; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 11px; border: none; color: white; background: transparent; }
        .tab-btn.active { background: var(--accent); color: black; }
        .content-scroll { flex: 1; overflow-y: auto; }

        /* Marker Styles */
        .monster-marker { width: 60px; height: 60px; background-size: cover; background-position: center; border-radius: 12px; border: 2px solid var(--accent); cursor: pointer; filter: drop-shadow(0 0 10px var(--accent)); }
        .portal-marker { width: 50px; height: 50px; border-radius: 50%; border: 3px solid var(--portal); background-size: cover; background-position: center; box-shadow: 0 0 15px var(--portal); cursor: pointer; }

        #camera-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: black; z-index: 10000; display: none; flex-direction: column; align-items: center; justify-content: center; }
        #video { width: 100%; max-height: 80%; object-fit: cover; }

        /* Eco-Dex Design */
        .dex-item { background: var(--card); padding: 10px; border-radius: 12px; min-width: 100px; text-align: center; border: 1px solid #333; }
        .dex-item img { width: 60px; height: 60px; border-radius: 8px; object-fit: cover; margin-bottom: 5px; }
    </style>
</head>
<body>

    <div id="map"></div>

    <div class="ui-top">
        <div class="stat-badge">⚾ <span id="topBalls">20</span></div>
        <div class="stat-badge">📡 <span id="topRadar">0</span></div>
    </div>

    <button class="btn-create" onclick="openCamera()">➕ PORTAL ERSTELLEN</button>

    <!-- Kombiniertes Detail-Overlay für Portale und Monster -->
    <div id="detail-overlay" onclick="closeDetail()">
        <div class="detail-card" id="main-card" onclick="event.stopPropagation()">
            <img id="detail-img" src="" alt="Detail Foto">
            <div class="detail-info">
                <h2 id="detail-name" style="margin: 0; color: var(--accent);">NAME</h2>
                <p id="detail-desc" style="color: #888; margin: 10px 0;">Objekt-Informationen...</p>
                <button id="action-btn" class="stat-badge" style="background: var(--accent); border:none; width: 100%; padding: 15px; color: black;" onclick="handleAction()">AKTION</button>
                <p onclick="closeDetail()" style="margin-top: 15px; font-size: 12px; opacity: 0.5; cursor:pointer;">Schließen</p>
            </div>
        </div>
    </div>

    <div id="camera-overlay">
        <video id="video" autoplay playsinline></video>
        <div style="margin-top: 20px; display: flex; gap: 20px;">
            <button class="stat-badge" style="background: #ff3b30; border:none;" onclick="closeCamera()">X</button>
            <button class="stat-badge" style="background: var(--portal); border:none; padding: 15px 30px;" onclick="takePhoto()">FOTO & NAME</button>
        </div>
        <canvas id="canvas" style="display:none;"></canvas>
    </div>

    <div class="dashboard">
        <div class="tab-nav">
            <button id="btn-dex" class="tab-btn active" onclick="showTab('dex')">Eco-Dex</button>
            <button id="btn-inv" class="tab-btn" onclick="showTab('inv')">Inventar</button>
            <button id="btn-stat" class="tab-btn" onclick="showTab('stat')">Status</button>
        </div>
        <div id="tab-dex" class="content-scroll">
            <div id="dexList" style="display: flex; gap: 10px; overflow-x: auto; padding: 10px;">
                <p style="opacity: 0.3; font-size: 12px;">Noch keine EcoMons gefangen...</p>
            </div>
        </div>
        <div id="tab-inv" class="content-scroll" style="display:none; padding: 10px;">
            <div class="dex-item" style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                <span>Cyber-Bälle</span> <b id="inv-balls">20</b>
            </div>
            <div class="dex-item" style="display:flex; justify-content: space-between; align-items: center;">
                <span>Radar-Energie</span> <b id="inv-radar">0</b>
            </div>
        </div>
        <div id="tab-stat" class="content-scroll" style="display:none; padding: 15px; text-align: center;">
            <h3 style="color:var(--accent)">E-CO-LEVEL 1</h3>
            <p>Sammle Energie an Portalen, um dein Radar zu verbessern.</p>
        </div>
    </div>

    <script>
        let map, userPos, userMarker;
        let balls = 20, radars = 0;
        let activeObject = null;
        let myMonsters = JSON.parse(localStorage.getItem('myMonsters') || '{}');
        let customPortals = JSON.parse(localStorage.getItem('myPortals') || '[]');

        const species = [
    { n: "Pyrox", img: "pyrox.png", desc: "The Ignis Sentinel" },
    { n: "Gastroq", img: "gastroq.png", desc: "The Aquarian Mechanist" },
    { n: "Aethel", img: "aethel.png", desc: "The Ethereal Weaver" },
    { n: "Kinetix", img: "kinetix.png", desc: "The Kinetic Vanguard" }
];

        navigator.geolocation.watchPosition(p => {
            userPos = [p.coords.longitude, p.coords.latitude];
            if (!map) {
                map = new maplibregl.Map({ 
                    container: 'map', 
                    style: 'https://basemaps.cartocdn.com/gl/dark-matter-gl-style/style.json', 
                    center: userPos, zoom: 17, pitch: 60 
                });
                map.on('load', () => {
                    const el = document.createElement('div'); 
                    el.style = "width:16px; height:16px; background:white; border-radius:50%; border:3px solid var(--accent); box-shadow: 0 0 10px var(--accent);";
                    userMarker = new maplibregl.Marker(el).setLngLat(userPos).addTo(map);
                    loadCustomPortals();
                    startMonsterSpawning();
                    renderDex();
                });
            } else { userMarker.setLngLat(userPos); }
        }, null, { enableHighAccuracy: true });

        // --- MONSTER LOGIK ---
        function startMonsterSpawning() {
            setInterval(() => {
                if(!userPos) return;
                const spawnPos = [
                    userPos[0] + (Math.random() - 0.5) * 0.005,
                    userPos[1] + (Math.random() - 0.5) * 0.005
                ];
                const type = species[Math.floor(Math.random() * species.length)];
                addMonsterToMap(spawnPos, type);
            }, 15000); // Alle 15 Sekunden ein neues Tier
        }

        function addMonsterToMap(pos, type) {
            const el = document.createElement('div');
            el.className = 'monster-marker';
            el.style.backgroundImage = `url(${type.img})`;
            
            const marker = new maplibregl.Marker({element: el}).setLngLat(pos).addTo(map);
            
            el.onclick = () => {
                activeObject = { ...type, pos, marker, type: 'monster' };
                openDetail(activeObject);
            };
        }

        // --- UI & AKTIONEN ---
        function openDetail(obj) {
            activeObject = obj;
            const btn = document.getElementById('action-btn');
            const card = document.getElementById('main-card');

            document.getElementById('detail-img').src = obj.img || obj.image;
            document.getElementById('detail-name').innerText = obj.n ? obj.n.toUpperCase() : obj.name.toUpperCase();
            document.getElementById('detail-desc').innerText = obj.desc || "Portal Energiequelle";
            
            if(obj.type === 'monster') {
                btn.innerText = "EINFANGEN (1 ⚾)";
                btn.style.background = "var(--accent)";
                card.style.borderColor = "var(--accent)";
            } else {
                btn.innerText = "ENERGIE ABSORBIEREN";
                btn.style.background = "var(--portal)";
                card.style.borderColor = "var(--portal)";
            }
            
            document.getElementById('detail-overlay').style.display = 'flex';
        }

        function handleAction() {
            if(!activeObject) return;

            if(activeObject.type === 'monster') {
                if(balls <= 0) return alert("Keine Cyber-Bälle mehr!");
                balls--;
                updateUI();
                
                if(Math.random() > 0.3) { // 70% Fangchance
                    alert(activeObject.n + " wurde gefangen!");
                    if(!myMonsters[activeObject.n]) {
                        myMonsters[activeObject.n] = { ...activeObject, count: 1, marker: null };
                    } else {
                        myMonsters[activeObject.n].count++;
                    }
                    localStorage.setItem('myMonsters', JSON.stringify(myMonsters));
                    activeObject.marker.remove();
                    renderDex();
                    closeDetail();
                } else {
                    alert("Entwischt! Versuch es nochmal.");
                }
            } else {
                radars += 5;
                updateUI();
                alert("Portal-Energie gespeichert: +5 Radar-Punkte!");
                closeDetail();
            }
        }

        function closeDetail() { document.getElementById('detail-overlay').style.display = 'none'; }

        // --- PORTAL SYSTEM ---
        async function openCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
                document.getElementById('video').srcObject = stream;
                document.getElementById('camera-overlay').style.display = 'flex';
            } catch (err) { alert("Kamera-Fehler"); }
        }

        function closeCamera() {
            const stream = document.getElementById('video').srcObject;
            if(stream) stream.getTracks().forEach(t => t.stop());
            document.getElementById('camera-overlay').style.display = 'none';
        }

        function takePhoto() {
            const portalName = prompt("Portal Name?", "Basis Alpha");
            if(!portalName) return;
            const video = document.getElementById('video');
            const canvas = document.getElementById('canvas');
            canvas.width = video.videoWidth; canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            const photoData = canvas.toDataURL('image/jpeg', 0.5);
            const newP = { pos: userPos, image: photoData, name: portalName, type: 'portal', id: Date.now() };
            customPortals.push(newP);
            localStorage.setItem('myPortals', JSON.stringify(customPortals));
            addPortalToMap(newP);
            closeCamera();
        }

        function addPortalToMap(pData) {
            const el = document.createElement('div');
            el.className = 'portal-marker';
            el.style.backgroundImage = `url(${pData.image})`;
            el.onclick = () => openDetail({...pData, type: 'portal'});
            new maplibregl.Marker({element: el}).setLngLat(pData.pos).addTo(map);
        }

        function loadCustomPortals() { customPortals.forEach(p => addPortalToMap(p)); }

        // --- HILFSFUNKTIONEN ---
        function updateUI() {
            document.getElementById('topBalls').innerText = balls;
            document.getElementById('inv-balls').innerText = balls;
            document.getElementById('topRadar').innerText = radars;
            document.getElementById('inv-radar').innerText = radars;
        }

        function renderDex() {
            const list = document.getElementById('dexList');
            const entries = Object.values(myMonsters);
            if(entries.length === 0) return;
            
            list.innerHTML = entries.map(m => `
                <div class="dex-item">
                    <img src="${m.img}">
                    <div style="font-size:10px; font-weight:bold;">${m.n}</div>
                    <div style="font-size:9px; color:var(--accent)">x${m.count}</div>
                </div>
            `).join('');
        }

        function showTab(t) {
            document.querySelectorAll('.content-scroll').forEach(s => s.style.display = 'none');
            document.getElementById('tab-' + t).style.display = t === 'dex' ? 'flex' : 'block';
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-' + t).classList.add('active');
        }
    </script>
</body>
</html>

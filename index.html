<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>EcoMon: Radar Pro</title>
    <script src='https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js'></script>
    <link href='https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css' rel='stylesheet' />
    <style>
        :root { --accent: #00F2FF; --bg: #0A0A0C; --panel: #161618; --card: #1c1c1e; --portal: #BC13FE; }
        body { margin: 0; background: var(--bg); color: white; font-family: -apple-system, sans-serif; overflow: hidden; height: 100vh; }
        #map { width: 100%; height: 100vh; position: absolute; z-index: 1; }

        /* UI Oben */
        .ui-top { position: fixed; top: 15px; left: 15px; z-index: 1000; display: flex; gap: 8px; pointer-events: none; }
        .stat-badge { background: rgba(0,0,0,0.8); padding: 8px 12px; border-radius: 8px; border: 1px solid var(--accent); font-weight: bold; pointer-events: auto; }

        /* Dashboard & Tabs */
        .dashboard { 
            position: fixed; bottom: 0; left: 0; width: 100%; height: 42vh; 
            background: var(--panel); border-top: 2px solid var(--accent); z-index: 5000; 
            padding: 15px; box-sizing: border-box; display: flex; flex-direction: column;
        }
        .tab-nav { display: flex; background: #2c2c2e; border-radius: 12px; margin-bottom: 15px; padding: 4px; }
        .tab-btn { flex: 1; padding: 12px; text-align: center; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 11px; border: none; color: white; background: transparent; text-transform: uppercase; }
        .tab-btn.active { background: var(--accent); color: black; }

        .content-scroll { flex: 1; overflow-y: auto; }

        /* Marker */
        .monster-marker { font-size: 50px; cursor: pointer; filter: drop-shadow(0 0 10px var(--accent)); z-index: 10; padding: 15px; }
        .portal-marker { 
            width: 60px; height: 60px; border-radius: 50%; border: 3px double var(--portal);
            background: radial-gradient(circle, var(--portal) 30%, transparent 70%);
            animation: rotate 3s infinite linear; cursor: pointer; filter: drop-shadow(0 0 15px var(--portal));
        }
        @keyframes rotate { from {transform: rotate(0deg);} to {transform: rotate(360deg);} }

        /* Catch-Screen */
        #catch-screen { 
            position: fixed; top:0; left:0; width:100%; height:100%; 
            background: rgba(0,0,0,0.95); z-index: 9999; display: none; 
            flex-direction: column; align-items: center; justify-content: center;
        }
        .btn-main { background: var(--accent); border:none; padding: 15px 45px; border-radius: 30px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div id="map"></div>

    <div class="ui-top">
        <div class="stat-badge">⚾ <span id="topBalls">20</span></div>
        <div class="stat-badge">📡 <span id="topRadar">0</span></div>
    </div>

    <div id="catch-screen">
        <h2 id="catch-name">WILDES TIER</h2>
        <div id="catch-emoji" style="font-size: 120px; margin: 30px 0;">🦊</div>
        <button id="catchButton" class="btn-main" onclick="attemptCatch()">EINFANGEN</button>
        <p style="color: var(--portal); margin-top: 10px; font-size: 12px;">Fernfang kostet 6 Radars</p>
        <p onclick="exitCatch()" style="margin-top: 25px; opacity: 0.5; cursor: pointer;">Flüchten</p>
    </div>

    <div class="dashboard">
        <div class="tab-nav">
            <button id="btn-dex" class="tab-btn active" onclick="showTab('dex')">Eco-Dex</button>
            <button id="btn-inv" class="tab-btn" onclick="showTab('inv')">Inventar</button>
            <button id="btn-stat" class="tab-btn" onclick="showTab('stat')">Status</button>
        </div>

        <div id="tab-dex" class="content-scroll">
            <div id="dexList" style="display: flex; gap: 10px; overflow-x: auto; padding: 10px;"></div>
        </div>

        <div id="tab-inv" class="content-scroll" style="display:none; padding: 10px;">
            <div style="background: var(--card); padding: 15px; border-radius: 12px; border: 1px solid #333; display: flex; align-items: center; gap: 15px; margin-bottom: 10px;">
                <span style="font-size: 30px;">📡</span>
                <div><b>Radar-Module</b><br><small>6 benötigt für Fernfang</small></div>
                <b id="invRadar" style="margin-left: auto; color: var(--portal); font-size: 20px;">0</b>
            </div>
            <div style="background: var(--card); padding: 15px; border-radius: 12px; border: 1px solid #333; display: flex; align-items: center; gap: 15px;">
                <span style="font-size: 30px;">⚾</span>
                <div><b>Eco-Balls</b><br><small>Vorrat</small></div>
                <b id="invBalls" style="margin-left: auto; color: var(--accent); font-size: 20px;">20</b>
            </div>
        </div>

        <div id="tab-stat" class="content-scroll" style="display:none; padding: 10px;">
            <div style="background: var(--card); padding: 15px; border-radius: 12px; border: 1px solid #333;">
                <b>Level 2 Explorer</b>
                <div style="width:100%; height:12px; background:#333; border-radius:6px; margin:15px 0; overflow:hidden;">
                    <div style="width:70%; height:100%; background:var(--accent);"></div>
                </div>
                <small>70 / 100 XP</small>
            </div>
        </div>
    </div>

    <script>
        let map, userPos, userMarker;
        let balls = 20, radars = 0;
        let myMonsters = {};
        let activeTarget = null;
        let lastPortalTime = 0;

        const MIN_DIST = 0.05; 

        function getDistance(p1, p2) {
            if(!p1 || !p2) return 999;
            return Math.sqrt(Math.pow(p1[0]-p2[0], 2) + Math.pow(p1[1]-p2[1], 2)) * 111;
        }

        navigator.geolocation.watchPosition(p => {
            userPos = [p.coords.longitude, p.coords.latitude];
            if (!map) {
                map = new maplibregl.Map({
                    container: 'map',
                    style: 'https://basemaps.cartocdn.com/gl/dark-matter-gl-style/style.json',
                    center: userPos, zoom: 17, pitch: 60
                });
                map.on('load', () => {
                    const el = document.createElement('div');
                    el.style = "width:16px; height:16px; background:white; border-radius:50%; border:3px solid var(--accent);";
                    userMarker = new maplibregl.Marker(el).setLngLat(userPos).addTo(map);
                    startSpawning();
                });
            } else { userMarker.setLngLat(userPos); }
        }, null, { enableHighAccuracy: true });

        function startSpawning() {
            setInterval(() => {
                if(!userPos) return;
                const isPortal = Math.random() > 0.7;
                const sPos = [userPos[0] + (Math.random()-0.5)*0.006, userPos[1] + (Math.random()-0.5)*0.006];
                
                const el = document.createElement('div');
                let type = null;

                if(isPortal) {
                    el.className = 'portal-marker';
                } else {
                    const species = [{n:"Volcarox", e:"🦊"}, {n:"Pandora", e:"🐼"}, {n:"Quaklord", e:"🦆"}];
                    type = species[Math.floor(Math.random()*species.length)];
                    el.className = 'monster-marker';
                    el.innerHTML = type.e;
                }

                const marker = new maplibregl.Marker({element: el}).setLngLat(sPos).addTo(map);

                const clickAction = (e) => {
                    e.stopPropagation();
                    if(isPortal) {
                        const now = Date.now();
                        if(now - lastPortalTime < 60000) return alert(`Portal lädt auf...`);
                        lastPortalTime = now;
                        radars += 3; updateUI();
                        marker.remove();
                        alert("Radar +3 erhalten!");
                    } else {
                        // IMMER anklickbar machen, Prüfung passiert erst beim Einfangen
                        activeTarget = { ...type, marker };
                        openCatch();
                    }
                };
                el.onclick = clickAction; el.ontouchstart = clickAction;
            }, 8000);
        }

        function openCatch() {
            document.getElementById('catch-emoji').innerText = activeTarget.e;
            document.getElementById('catch-name').innerText = activeTarget.n.toUpperCase();
            document.getElementById('catch-screen').style.display = 'flex';
        }

        function attemptCatch() {
            if(balls <= 0) return alert("Keine Bälle!");
            
            const d = getDistance(userPos, activeTarget.marker.getLngLat().toArray());
            
            // NEUE REGEL: 6 Radars für Fernfang
            if(d > MIN_DIST) {
                if(radars < 6) {
                    alert("Du brauchst 6 Radars für einen Fernfang! Geh näher ran oder sammle mehr Energie.");
                    return;
                }
                radars -= 6; 
            }

            balls--; 
            updateUI();

            if(Math.random() > 0.4) {
                const n = activeTarget.n;
                if(!myMonsters[n]) myMonsters[n] = { ...activeTarget, count: 0 };
                myMonsters[n].count++;
                activeTarget.marker.remove();
                renderDex(); alert(n + " gefangen!"); exitCatch();
            } else { alert("Oh nein! Es ist entwischt."); exitCatch(); }
        }

        function exitCatch() { document.getElementById('catch-screen').style.display = 'none'; }
        
        function showTab(t) {
            document.getElementById('tab-dex').style.display = t === 'dex' ? 'block' : 'none';
            document.getElementById('tab-inv').style.display = t === 'inv' ? 'block' : 'none';
            document.getElementById('tab-stat').style.display = t === 'stat' ? 'block' : 'none';
            
            document.getElementById('btn-dex').classList.toggle('active', t === 'dex');
            document.getElementById('btn-inv').classList.toggle('active', t === 'inv');
            document.getElementById('btn-stat').classList.toggle('active', t === 'stat');
        }

        function renderDex() {
            document.getElementById('dexList').innerHTML = Object.values(myMonsters).map(m => `
                <div style="background:var(--card); padding:10px; border-radius:12px; min-width:100px; text-align:center; border:1px solid #333;">
                    <div style="font-size:30px;">${m.e}</div>
                    <b>${m.n}</b><br><small>${m.count}x</small>
                </div>
            `).join('');
        }

        function updateUI() {
            document.getElementById('topBalls').innerText = balls;
            document.getElementById('invBalls').innerText = balls;
            document.getElementById('topRadar').innerText = radars;
            document.getElementById('invRadar').innerText = radars;
        }
    </script>
</body>
</html>
